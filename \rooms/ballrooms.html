function addDiningFurniture() {
 const tableTopMat = new THREE.MeshLambertMaterial({ color: 0x7a4a24 });

 function createDiningTable(longLen, shortLen, topY) {
   const g = new THREE.Group();
   const top = new THREE.Mesh(new THREE.BoxGeometry(longLen, 7, shortLen), tableTopMat);
   top.position.y = topY;
   g.add(top);
   const apron = new THREE.Mesh(new THREE.BoxGeometry(longLen - 10, 10, shortLen - 10), tableTopMat);
   apron.position.y = topY - 8.5;
   g.add(apron);

   const legH = topY - 2;
   const leg = new THREE.CylinderGeometry(5, 6, legH, 10);
   const xOff = (longLen / 2) - 18;
   const zOff = (shortLen / 2) - 18;
   const legs = [
     [ xOff, legH / 2,  zOff],
     [-xOff, legH / 2,  zOff],
     [ xOff, legH / 2, -zOff],
     [-xOff, legH / 2, -zOff],
   ];
   legs.forEach(([x,y,z]) => {
     const l = new THREE.Mesh(leg, tableLegMat);
     l.position.set(x,y,z);
     g.add(l);
   });
   return g;
 }

 function createDiningChair() {
   const g = new THREE.Group();
   const seat = new THREE.Mesh(new THREE.BoxGeometry(36, 7, 36), chairSeat);
   seat.position.y = 46;
   g.add(seat);

   rail.position.y = 40;
   g.add(rail);
   const back = new THREE.Mesh(new THREE.BoxGeometry(36, 52, 7), chairWood);
   back.position.set(0, 74, -14.5);
   g.add(back);
   const legGeo = new THREE.CylinderGeometry(3, 3.5, 46, 10);
   const pts = [
     [ 14.5, 23,  14.5],
     [-14.5, 23,  14.5],
     [ 14.5, 23, -14.5],
     [-14.5, 23, -14.5]
   ];
   pts.forEach(([x,y,z]) => {
     const l = new THREE.Mesh(legGeo, chairWood);
     l.position.set(x,y,z);
     g.add(l);
   });
   return g;
 }

 function placeTableSet(x, z, longAxis) {
   const topY = 76;
   const longLen = 190;
   const shortLen = 85;
   const table = createDiningTable(longLen, shortLen, topY);
   table.position.set(x, 0, z);
   if (longAxis === 'x') table.rotation.y = Math.PI / 2;
   else table.rotation.y = 0;
   scene.add(table);

   const along = [-60, 0, 60];
   const sideOffset = 78;

   along.forEach((t) => {
     const c1 = createDiningChair();
     const c2 = createDiningChair();
     if (longAxis === 'z') {
       c1.position.set(x - sideOffset, 0, z + t);
       c1.rotation.y = Math.PI / 2;
       c2.position.set(x + sideOffset, 0, z + t);
       c2.rotation.y = -Math.PI / 2;
     } else {
       c1.position.set(x + t, 0, z - sideOffset);
       c1.rotation.y = 0;
       c2.position.set(x + t, 0, z + sideOffset);
       c2.rotation.y = Math.PI;

     scene.add(c1);
     scene.add(c2);
   });

function addWallPictures() {
 const frameMat = new THREE.MeshLambertMaterial({ color: 0x1f1f1f });

 function makeSceneryTexture(seed) {
   const c = document.createElement('canvas');
   c.width = 512; c.height = 384;
   const ctx = c.getContext('2d');

   const sky = ctx.createLinearGradient(0, 0, 0, c.height * 0.7);
   sky.addColorStop(0, seed % 2 ? '#6aa9ff' : '#7cd3ff');
   sky.addColorStop(1, '#e8f7ff');
   ctx.fillStyle = sky;
   ctx.fillRect(0, 0, c.width, c.height);

   ctx.beginPath();
   const sunX = 80 + (seed * 73) % 320;
   const sunY = 70 + (seed * 41) % 120;
   ctx.arc(sunX, sunY, 28, 0, Math.PI * 2);
   ctx.fillStyle = 'rgba(255, 244, 200, 0.95)';
   ctx.fill();

   function ridge(yBase, amp, color) {
     ctx.beginPath();
     ctx.moveTo(0, yBase);
     for (let x = 0; x <= c.width; x += 16) {
       const y = yBase + Math.sin((x + seed * 33) / 55) * amp + Math.cos((x + seed * 9) / 90) * (amp * 0.6);
       ctx.lineTo(x, y);
     }
     ctx.lineTo(c.width, c.height);
     ctx.lineTo(0, c.height);
     ctx.closePath();
     ctx.fillStyle = color;
     ctx.fill();
   }

   ridge(210, 18, seed % 3 === 0 ? '#4a6a7a' : '#567b6b');
   ridge(250, 26, seed % 3 === 1 ? '#3f5e67' : '#4a6b5d');
   ridge(290, 32, seed % 3 === 2 ? '#2f4f45' : '#355a4f');

   ctx.fillStyle = seed % 2 ? 'rgba(40, 120, 200, 0.55)' : 'rgba(70, 150, 90, 0.55)';
   ctx.fillRect(0, 300, c.width, 50);

   ctx.fillStyle = 'rgba(20, 60, 30, 0.85)';
   for (let i = 0; i < 18; i++) {
     const x = (i * 33 + seed * 17) % c.width;
     const h = 40 + ((i * 19 + seed * 11) % 55);
     ctx.beginPath();
     ctx.moveTo(x, 350);
     ctx.lineTo(x - 14, 350 - h);
     ctx.lineTo(x + 14, 350 - h);
     ctx.closePath();
     ctx.fill();
   }

   const v = ctx.createRadialGradient(c.width/2, c.height/2, 80, c.width/2, c.height/2, 320);
   v.addColorStop(0, 'rgba(0,0,0,0)');
   v.addColorStop(1, 'rgba(0,0,0,0.18)');
   ctx.fillStyle = v;
   ctx.fillRect(0, 0, c.width, c.height);

   const tex = new THREE.CanvasTexture(c);
   tex.anisotropy = 4;
   tex.needsUpdate = true;
   return tex;
 }

 function makeFramedPicture(seed) {
   const group = new THREE.Group();
   const frame = new THREE.Mesh(new THREE.BoxGeometry(170, 120, 8), frameMat);
   group.add(frame);
   const tex = makeSceneryTexture(seed);
   const artMat = new THREE.MeshLambertMaterial({ map: tex });
   const art = new THREE.Mesh(new THREE.PlaneGeometry(158, 108), artMat);
   art.position.z = 5;
   group.add(art);
   return group;
 }

 const y = 445;
 const wallSpots = [-540, -360, -180, 0, 180, 360, 540];

   p.position.set(-729, y, z);

   p.rotation.y = 0;
   scene.add(p);
 });
}

function addChandelier() {

 const brass = new THREE.MeshLambertMaterial({ color: 0x8a6a2a });
 const bulbM = new THREE.MeshLambertMaterial({ color: 0xfff2cc });

 const g = new THREE.Group();

 const cap = new THREE.Mesh(new THREE.CylinderGeometry(18, 18, 12, 20), metal);
 cap.position.y = 740 - 6;
 g.add(cap);

 const chain = new THREE.Mesh(new THREE.CylinderGeometry(4, 4, 170, 16), metal);
 chain.position.y = 740 - 12 - 85;
 g.add(chain);

 const ring = new THREE.Mesh(new THREE.TorusGeometry(130, 8, 16, 30), brass);
 ring.position.y = 740 - 12 - 170 - 30;
 ring.rotation.x = Math.PI / 2;
 g.add(ring);

 const armGeo = new THREE.CylinderGeometry(2.5, 2.5, 55, 10);
 const bulbGeo = new THREE.SphereGeometry(11, 18, 18);

 const bulbs = 10;
 for (let i = 0; i < bulbs; i++) {
   const a = (i / bulbs) * Math.PI * 2;
   const x = Math.cos(a) * 130;
   const z = Math.sin(a) * 130;

   const arm = new THREE.Mesh(armGeo, brass);
   arm.position.set(x * 0.85, ring.position.y, z * 0.85);
   arm.lookAt(new THREE.Vector3(x, ring.position.y, z));
   arm.rotation.z += Math.PI / 2;
   g.add(arm);

   const bulb = new THREE.Mesh(bulbGeo, bulbM);
   bulb.position.set(x, ring.position.y - 8, z);
   g.add(bulb);
 }

 g.position.set(0, 0, 0);
 scene.add(g);
}

 const rightJamb = new THREE.Mesh(new THREE.BoxGeometry(18, frameH, frameT), trimMat);
 rightJamb.position.set(frameW/2, frameH/2, 0);
 frame.add(rightJamb);
 const header = new THREE.Mesh(new THREE.BoxGeometry(frameW + 18, 18, frameT), trimMat);
 header.position.set(0, frameH - 9, 0);
 frame.add(header);
 frame.position.set(0, 0, 730);
 group.add(frame);

 const gap = 10;
 const slabW = (frameW - gap) / 2;
 const slabH = 740;
 const slabT = 10;

 function makeDoor(side) {
   const pivot = new THREE.Group();
   const slab = new THREE.Mesh(new THREE.BoxGeometry(slabW, slabH, slabT), doorMat);
   slab.position.set(side === 'left' ? slabW/2 : -slabW/2, slabH/2, 0);
   pivot.add(slab);
   const p1 = new THREE.Mesh(new THREE.BoxGeometry(slabW - 28, 170, 6), trimMat);
   p1.position.set(side === 'left' ? slabW/2 : -slabW/2, slabH/2 + 170, slabT/2 + 1);
   pivot.add(p1);
   const p2 = new THREE.Mesh(new THREE.BoxGeometry(slabW - 28, 170, 6), trimMat);
   p2.position.set(side === 'left' ? slabW/2 : -slabW/2, slabH/2 - 170, slabT/2 + 1);
   pivot.add(p2);
   const handle = new THREE.Mesh(new THREE.CylinderGeometry(3, 3, 28, 14), metalMat);
   handle.rotation.z = Math.PI / 2;
   handle.position.set(
     side === 'left' ? (slabW - 22) : -(slabW - 22),
     slabH/2,
     slabT/2 + 6
   );
   pivot.add(handle);
   return pivot;
 }

 const leftDoorPivot = makeDoor('left');
 const rightDoorPivot = makeDoor('right');

 leftDoorPivot.position.set(-gap/2, 0, 730);
 rightDoorPivot.position.set(gap/2, 0, 730);

 leftDoorPivot.rotation.y = 0.18;
 rightDoorPivot.rotation.y = -0.18;

 group.add(leftDoorPivot);
 group.add(rightDoorPivot);

 scene.add(group);
}

function updateRotation() {
 camera.rotation.order = 'YXZ';
 camera.rotation.set(pitch, yaw, 0);
}

function onKeyDown(e) {
 switch (e.code) {
 case 'KeyW': case 'ArrowUp': moveForward = true; break;
 case 'KeyS': case 'ArrowDown': moveBackward = true; break;
 case 'ArrowLeft': turnLeft = true; break;
 case 'ArrowRight': turnRight = true; break;
 }
}

function onKeyUp(e) {
 switch (e.code) {
 case 'KeyW': case 'ArrowUp': moveForward = false; break;
 case 'KeyS': case 'ArrowDown': moveBackward = false; break;
 case 'ArrowLeft': turnLeft = false; break;
 case 'ArrowRight': turnRight = false; break;
 }
}
function animate() {
  requestAnimationFrame(animate);

  if (true) {
    const delta = (performance.now() - prevTime) / 1000;
    prevTime = performance.now();

    const turnSpeed = 2.8;
    if (turnLeft) yaw += turnSpeed * delta;
    if (turnRight) yaw -= turnSpeed * delta;

    const moveZ = Number(moveForward) - Number(moveBackward);
    const speed = 150;
    const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);

    camera.position.x += forward.x * moveZ * speed * delta;
    camera.position.z += forward.z * moveZ * speed * delta;

    camera.position.x = Math.max(-680, Math.min(680, camera.position.x));
    camera.position.z = Math.max(-680, Math.min(680, camera.position.z));
    camera.position.y = 165;
  }

  
if (camera.position.z > 660) {
  const f = document.getElementById('fadeOverlay');
  if (f) f.style.opacity = '1';
  setTimeout(() => {
    window.location.href = '/maze.html';
  }, 600);
  return;
}

  updateRotation();
  renderer.render(scene, camera);
}
