<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Crowsnest Castle - Library (Detective's Office)</title>
<style>
#exitFade { position: fixed; inset: 0; background: #000; opacity: 0; pointer-events: none; z-index: 9999; transition: opacity 0.6s ease; }
#exitFade.show { opacity: 1; }
#instructionLine { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); padding: 8px 16px; font-size: 14px; color: #eee; background: rgba(0,0,0,0.55); border-radius: 6px; z-index: 30; pointer-events: none; white-space: nowrap; }
body { margin: 0; overflow: hidden; background: #000; font-family: Arial, sans-serif; }
#info { position: absolute; top: 15px; left: 15px; color: #ddd; font-size: 15px; background: rgba(0,0,0,0.6); padding: 12px; border-radius: 6px; z-index: 10; }
canvas { display: block; }
</style>
</head>
<body>
<div id="exitFade"></div>
<div id="instructionLine">
  Explore the Library • Review case files on the desk • Sit in the U-shaped seating area
</div>

<div id="fadeOverlay"></div>

<div id="info">
 W / ↑ = Forward<br>
 S / ↓ = Backward<br>
 ← = Turn Left<br>
 → = Turn Right
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>
// ============== CROWSNEST CASTLE - LIBRARY (Detective's Office) ==============

let scene, camera, renderer;
let moveForward = false, moveBackward = false, turnLeft = false, turnRight = false;
let yaw = 0, pitch = 0, prevTime = performance.now();

const texLoader = new THREE.TextureLoader();

// Reliable different old painting URLs
const paintingUrls = [
  "https://picsum.photos/id/1015/1024/1024",
  "https://picsum.photos/id/133/1024/1024",
  "https://picsum.photos/id/201/1024/1024",
  "https://picsum.photos/id/251/1024/1024",
  "https://picsum.photos/id/1016/1024/1024",
  "https://picsum.photos/id/180/1024/1024"
];

function createOldPaintingMaterial(index) {
  const url = paintingUrls[index % paintingUrls.length];
  return new THREE.MeshLambertMaterial({
    map: texLoader.load(url, t => t.colorSpace = THREE.SRGBColorSpace),
    side: THREE.DoubleSide
  });
}

function init() {
  setTimeout(() => { const f = document.getElementById('fadeOverlay'); if (f) f.remove(); }, 900);

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a2e);
  camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 3000);
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff, 0.75));

  const dirLight = new THREE.DirectionalLight(0xffeecc, 0.7);
  dirLight.position.set(0, 400, 900);
  dirLight.target.position.set(0, 200, -750);
  scene.add(dirLight); scene.add(dirLight.target);

  const leftFill = new THREE.DirectionalLight(0xffffff, 0.65);
  leftFill.position.set(-900, 300, 0); leftFill.target.position.set(0, 200, 0);
  scene.add(leftFill); scene.add(leftFill.target);

  const rightFill = new THREE.DirectionalLight(0xffffff, 0.65);
  rightFill.position.set(900, 300, 0); rightFill.target.position.set(0, 200, 0);
  scene.add(rightFill); scene.add(rightFill.target);

  const topFill = new THREE.DirectionalLight(0xffffff, 0.5);
  topFill.position.set(0, 1200, 0); topFill.target.position.set(0, 0, 0);
  scene.add(topFill); scene.add(topFill.target);

  const lamp = new THREE.PointLight(0xffaa77, 3.5, 1500);
  lamp.position.set(150, 280, 120);
  scene.add(lamp);

  // Floor & Ceiling
  const floor = new THREE.Mesh(new THREE.PlaneGeometry(1500, 1500), new THREE.MeshLambertMaterial({ color: 0x2c2418 }));
  floor.rotation.x = -Math.PI / 2; scene.add(floor);

  const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(1500, 1500), new THREE.MeshLambertMaterial({ color: 0x3f2f22 }));
  ceiling.rotation.x = Math.PI / 2; ceiling.position.y = 740; scene.add(ceiling);

  createWalls();

  addFullWallBookshelves();

  addLargeDesk();
  addUShapedSeatingArea();
  addReadingLamps();

  document.addEventListener('keydown', onKeyDown);
  document.addEventListener('keyup', onKeyUp);

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  camera.position.set(80, 165, 520);
  updateRotation();
  animate();
}

function createWalls() {
  const mat = new THREE.MeshLambertMaterial({ color: 0x4a3a2c });
  let w = new THREE.Mesh(new THREE.BoxGeometry(1500, 740, 40), mat); w.position.set(0, 370, -750); scene.add(w);
  w = new THREE.Mesh(new THREE.BoxGeometry(500, 740, 40), mat); w.position.set(-500, 370, 750); scene.add(w);
  w = new THREE.Mesh(new THREE.BoxGeometry(500, 740, 40), mat); w.position.set(500, 370, 750); scene.add(w);
  w = new THREE.Mesh(new THREE.BoxGeometry(40, 740, 1500), mat); w.position.set(-750, 370, 0); scene.add(w);
  w = new THREE.Mesh(new THREE.BoxGeometry(40, 740, 1500), mat); w.position.set(750, 370, 0); scene.add(w);
}

// ==================== BACK WALL BOOKS + 3 LARGE SQUARE PICTURES MOVED FURTHER TOWARD DOOR ====================
function addFullWallBookshelves() {
  const woodMat = new THREE.MeshLambertMaterial({ color: 0x3c2a1f });
  const bookColors = [0x2a1f17, 0x4a2f1f, 0x1f3a2a, 0x3a2f4a, 0x8b4513, 0x556b2f, 0x483d8b, 0xcd853f, 0x6b4e2a];

  // Back wall - lots of books
  function addBooks(centerX, centerY, centerZ, length, direction) {
    for (let b = 0; b < 92; b++) {
      const bw = 5 + Math.random() * 16;
      const bh = 22 + Math.random() * 48;
      const bd = 20 + Math.random() * 14;
      const color = bookColors[Math.floor(Math.random() * bookColors.length)];

      const book = new THREE.Mesh(
        new THREE.BoxGeometry(bw, bh, bd),
        new THREE.MeshLambertMaterial({ color: color })
      );
      book.position.set(
        centerX + (b - 46) * (bw * 0.88),
        centerY + bh/2 - 6,
        centerZ + direction * 26
      );
      book.rotation.y = Math.PI / 2;
      scene.add(book);
    }
  }

  for (let i = 0; i < 6; i++) {
    const y = 80 + i * 118;
    const shelf = new THREE.Mesh(new THREE.BoxGeometry(1480, 24, 52), woodMat);
    shelf.position.set(0, y, -720);
    scene.add(shelf);
    addBooks(0, y, -720, 1480, 1);
  }

  // Frame material
  const frameMat = new THREE.MeshLambertMaterial({ color: 0x3c2a1f });

  // 3 LARGE SQUARE PICTURES side by side on LEFT wall - moved 3x further toward door
  for (let i = 0; i < 3; i++) {
    const x = -420 + i * 460;        // increased spread and shifted further toward door
    const size = 340;

    const frame = new THREE.Mesh(
      new THREE.BoxGeometry(size + 24, size + 24, 12),
      frameMat
    );
    frame.position.set(-720, 380, x);
    frame.rotation.y = Math.PI / 2;
    scene.add(frame);

    const picture = new THREE.Mesh(
      new THREE.PlaneGeometry(size, size),
      createOldPaintingMaterial(i)
    );
    picture.position.set(-695, 380, x);
    picture.rotation.y = Math.PI / 2;
    scene.add(picture);
  }

  // 3 LARGE SQUARE PICTURES side by side on RIGHT wall - moved 3x further toward door
  for (let i = 0; i < 3; i++) {
    const x = -420 + i * 460;
    const size = 340;

    const frame = new THREE.Mesh(
      new THREE.BoxGeometry(size + 24, size + 24, 12),
      frameMat
    );
    frame.position.set(720, 380, x);
    frame.rotation.y = Math.PI / 2;
    scene.add(frame);

    const picture = new THREE.Mesh(
      new THREE.PlaneGeometry(size, size),
      createOldPaintingMaterial(i + 3)
    );
    picture.position.set(695, 380, x);
    picture.rotation.y = Math.PI / 2;
    scene.add(picture);
  }
}

function addLargeDesk() {
  const woodMat = new THREE.MeshLambertMaterial({ color: 0x3c2a1f });
  const topMat = new THREE.MeshLambertMaterial({ color: 0x2a1f17 });
  const desk = new THREE.Group();
  const body = new THREE.Mesh(new THREE.BoxGeometry(280, 92, 140), woodMat); body.position.y = 46; desk.add(body);
  const top = new THREE.Mesh(new THREE.BoxGeometry(292, 10, 152), topMat); top.position.y = 92; desk.add(top);
  const legGeo = new THREE.BoxGeometry(12, 88, 12);
  [[-130,44,-65],[130,44,-65],[-130,44,65],[130,44,65]].forEach(([x,y,z]) => {
    const leg = new THREE.Mesh(legGeo, woodMat); leg.position.set(x,y,z); desk.add(leg);
  });
  desk.position.set(0, 0, -280); scene.add(desk);
}

function addUShapedSeatingArea() {
  const sofaMat = new THREE.MeshLambertMaterial({ color: 0x1f2a2a });
  const woodMat = new THREE.MeshLambertMaterial({ color: 0x3c2a1f });
  function createSofa() {
    const g = new THREE.Group();
    const seat = new THREE.Mesh(new THREE.BoxGeometry(160, 18, 72), sofaMat); seat.position.y = 28; g.add(seat);
    const back = new THREE.Mesh(new THREE.BoxGeometry(160, 68, 12), sofaMat); back.position.set(0, 62, -30); g.add(back);
    const arm1 = new THREE.Mesh(new THREE.BoxGeometry(12, 48, 72), woodMat); arm1.position.set(-74, 40, 0); g.add(arm1);
    const arm2 = new THREE.Mesh(new THREE.BoxGeometry(12, 48, 72), woodMat); arm2.position.set(74, 40, 0); g.add(arm2);
    return g;
  }
  const left = createSofa(); left.position.set(-140, 0, -80); left.rotation.y = Math.PI / 2; scene.add(left);
  const right = createSofa(); right.position.set(140, 0, -80); right.rotation.y = -Math.PI / 2; scene.add(right);
  const back = createSofa(); back.position.set(0, 0, -220); scene.add(back);
}

function addReadingLamps() {
  const lampLight = new THREE.PointLight(0xffeecc, 1.8, 400);
  lampLight.position.set(40, 130, -260);
  scene.add(lampLight);
}

function checkExitDoor() {
  if (camera.position.x > -280 && camera.position.x < 280 && camera.position.z > 650 && camera.position.z < 720) {
    const exitFade = document.getElementById('exitFade');
    if (exitFade) exitFade.classList.add('show');
    setTimeout(() => { window.location.href = '../index.html'; }, 600);
  }
}

function updateRotation() { camera.rotation.order = 'YXZ'; camera.rotation.set(pitch, yaw, 0); }

function onKeyDown(e) {
  switch (e.code) {
    case 'KeyW': case 'ArrowUp': moveForward = true; break;
    case 'KeyS': case 'ArrowDown': moveBackward = true; break;
    case 'ArrowLeft': turnLeft = true; break;
    case 'ArrowRight': turnRight = true; break;
  }
}

function onKeyUp(e) {
  switch (e.code) {
    case 'KeyW': case 'ArrowUp': moveForward = false; break;
    case 'KeyS': case 'ArrowDown': moveBackward = false; break;
    case 'ArrowLeft': turnLeft = false; break;
    case 'ArrowRight': turnRight = false; break;
  }
}

function animate() {
  requestAnimationFrame(animate);
  const delta = (performance.now() - prevTime) / 1000; prevTime = performance.now();

  const turnSpeed = 2.8;
  if (turnLeft) yaw += turnSpeed * delta;
  if (turnRight) yaw -= turnSpeed * delta;

  const moveZ = Number(moveForward) - Number(moveBackward);
  const speed = 150;
  const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);

  camera.position.x += forward.x * moveZ * speed * delta;
  camera.position.z += forward.z * moveZ * speed * delta;

  camera.position.x = Math.max(-680, Math.min(680, camera.position.x));
  camera.position.z = Math.max(-680, Math.min(680, camera.position.z));
  camera.position.y = 165;

  checkExitDoor();
  updateRotation();
  renderer.render(scene, camera);
}

init();
</script>
</body>
</html>
