<script>
// ==================== YOUR ORIGINAL 2D MAZE CODE (unchanged) ====================
const canvas = document.getElementById("maze");
const ctx = canvas.getContext("2d");
const toolLabel = document.getElementById("toolLabel");
let tool = "edit";
function setTool(t){
 tool = t;
 toolLabel.textContent = "Tool: " + t;
}

const player = {
 x: 50,
 y: 300,
 r: 8,
 speed: 3,
 dir: "down",
 moving: false,
 frame: 0,
 frameTime: 0,
 frameDuration: 110
};

const PLAYER_PARTS = {
 head:{x:1,y:0,r:10},
 body:{x:1,y:0,w:15,h:12},
 legs:{x:1,y:0,footSep:4,stride:11}
};

const keys = {};
addEventListener("keydown",e=>keys[e.key]=true);
addEventListener("keyup",e=>keys[e.key]=false);

let rooms = [];
let lines = [];
let doors = [];

let autoDoorTriggered = false;

async function loadMazeData() {
 try {
  const embedded = document.getElementById("mazeData");
  if (embedded && embedded.textContent.trim()) {
   const data = JSON.parse(embedded.textContent);
   rooms = data.rooms || [];
   lines = data.lines || [];
   doors = data.doors || [];
  }
  rooms.forEach(r => {
   if (!r.name) r.name = "Room " + r.id;
   if (!r.textColor) r.textColor = "#f2f2f2";
  });
  populateDropdown();
  draw();
 } catch (err) {
  console.error("Failed to load maze data", err);
 }
}

const roomSelect = document.getElementById("roomSelect");
function populateDropdown(){
 roomSelect.innerHTML="";
 rooms.forEach(r=>{
  const o=document.createElement("option");
  o.value=r.id;
  o.textContent=r.name;
  roomSelect.appendChild(o);
 });
}
function renameRoom(){
 const r=rooms.find(x=>x.id==roomSelect.value);
 if(!r) return;
 if(roomName.value) r.name=roomName.value;
 r.textColor=roomColor.value;
 populateDropdown();
 draw();
}
function saveLayout(){
 const data={rooms,lines,doors};
 const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
 const a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="maze-layout.json";
 a.click();
 URL.revokeObjectURL(a.href);
}
function loadLayout(e){
 const f=e.target.files[0]; if(!f) return;
 const r=new FileReader();
 r.onload=ev=>{
  const d=JSON.parse(ev.target.result);
  rooms=d.rooms||[];
  lines=d.lines||[];
  doors=d.doors||[];
  populateDropdown();
  draw();
 };
 r.readAsText(f);
}

// Keep all your original drawing and movement functions (collision, draw, etc.)
// ... (your existing code for pointToSegmentDistance, roomAt, nearDoorForRoom, hitsAnyWallLine, canCrossRoomBoundary, tryMovePlayer, gentleSnapBack, clampOutsideToCanvas, updatePlayer, drawProceduralTopDownStanding, drawPlayer, draw, resize, loop, etc.)

function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
 rooms.forEach(r=>{
  ctx.fillStyle=r.color || "#555";
  ctx.fillRect(r.x,r.y,r.w,r.h);
  ctx.fillStyle=r.textColor;
  ctx.fillText(r.name,r.x+8,r.y+18);
 });
 ctx.strokeStyle="yellow"; ctx.lineWidth=5;
 doors.forEach(d=>{
  ctx.beginPath(); ctx.moveTo(d.x1,d.y1); ctx.lineTo(d.x2,d.y2); ctx.stroke();
 });
 ctx.strokeStyle="#000"; ctx.lineWidth=3;
 lines.forEach(L=>{
  ctx.beginPath(); ctx.moveTo(L.x1,L.y1); ctx.lineTo(L.x2,L.y2); ctx.stroke();
 });
 drawPlayer();
}

function resize(){
 canvas.width = canvas.clientWidth;
 canvas.height = canvas.clientHeight;
}
addEventListener("resize", resize);
resize();

let lastTime = performance.now();
function loop(now){
 const dt = now - lastTime;
 lastTime = now;
 updatePlayer(dt);
 draw();
 requestAnimationFrame(loop);
}

loadMazeData();
requestAnimationFrame(loop);
</script>
