<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Crime Scene Maze App</title>
<style>
 body {
  margin: 0;
  background: #000;
  font-family: Arial, sans-serif;
  margin-left: 150px;
  overflow: hidden;
 }
 #sidebar {
  position: fixed;
  left: 0;
  top: 0;
  width: 135px;
  height: 100%;
  background: #222;
  color: #fff;
  padding: 12px;
  box-sizing: border-box;
  border-right: 3px solid #444;
  font-size: 14px;
 }
 #sidebar h3 { margin-top: 0; text-align: center; }
 #sidebar label { display: block; margin-top: 10px; }
 #sidebar select, #sidebar input {
  width: 100%;
  padding: 6px;
  margin-top: 5px;
  box-sizing: border-box;
 }
 #sidebar button {
  width: 100%;
  margin-top: 10px;
  padding: 8px;
  background: #444;
  color: #fff;
  border: none;
  cursor: pointer;
 }
 #sidebar button:hover { background: #666; }
 #toolLabel {
  margin-top: 10px;
  text-align: center;
  font-size: 13px;
  color: #ccc;
 }
 #maze {
  position: absolute;
  left: 150px;
  top: 0;
  width: calc(100vw - 150px);
  height: 100vh;
  background: #e0e0e0;
  border: 3px solid #000;
 }

 /* 3D Room Overlay */
 #threeContainer {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  display: none;
  background: #000;
  z-index: 200;
 }
 #threeInfo {
  position: fixed;
  top: 15px; left: 15px;
  background: rgba(0,0,0,0.8);
  color: #fff;
  padding: 12px 18px;
  border-radius: 8px;
  z-index: 210;
  font-size: 16px;
 }

 /* Loading Ball Spinner */
 #loadingBall {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 80px;
  height: 80px;
  border: 8px solid #333;
  border-top: 8px solid #00ccff;
  border-radius: 50%;
  animation: spin 1.2s linear infinite;
  z-index: 220;
  display: none;
 }

 @keyframes spin {
  0% { transform: translate(-50%, -50%) rotate(0deg); }
  100% { transform: translate(-50%, -50%) rotate(360deg); }
 }

 #backButton {
  position: fixed;
  top: 15px; right: 15px;
  padding: 10px 20px;
  background: #c33;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  z-index: 210;
 }
</style>
</head>
<body>
<div id="sidebar">
 <h3>Room Tools</h3>
 <button onclick="setTool('edit')">Edit Rooms</button>
 <button onclick="setTool('draw')">Draw Line</button>
 <button onclick="setTool('erase')">Erase Line</button>
 <button onclick="setTool('door')">Draw Door</button>
 <button onclick="jumpToDoor()">Jump to Door</button>
 <div id="toolLabel">Tool: Edit Rooms</div>
 <label>Select Room:</label>
 <select id="roomSelect"></select>
 <label>Room Name:</label>
 <input id="roomName">
 <label>Text Color:</label>
 <input type="color" id="roomColor" value="#000000">
 <button onclick="renameRoom()">Rename Room</button>
 <button onclick="saveLayout()">Save Layout</button>
 <button onclick="document.getElementById('loadFile').click()">Load Layout</button>
 <input type="file" id="loadFile" accept=".json" hidden onchange="loadLayout(event)">
</div>

<canvas id="maze"></canvas>

<!-- 3D Room Container -->
<div id="threeContainer">
 <div id="threeInfo">Opening door...</div>
 <div id="loadingBall"></div>
 <button id="backButton">← Back to Maze</button>
</div>

<script src="https://unpkg.com/three@0.172.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.172.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://unpkg.com/three@0.172.0/examples/js/loaders/DRACOLoader.js"></script>

<script>
// ==================== PLAYER WITH LEGS ====================
const canvas = document.getElementById("maze");
const ctx = canvas.getContext("2d");
const toolLabel = document.getElementById("toolLabel");
let tool = "edit";

function setTool(t){
 tool = t;
 toolLabel.textContent = "Tool: " + t;
}

const player = {
 x: 50,
 y: 300,
 r: 8,
 speed: 3,
 dir: "down",
 moving: false,
 frame: 0,
 frameTime: 0,
 frameDuration: 110
};

const PLAYER_PARTS = {
 head:{x:1,y:0,r:10},
 body:{x:1,y:0,w:15,h:12},
 legs:{x:1,y:0,footSep:4,stride:11}
};

const keys = {};
addEventListener("keydown",e=>keys[e.key]=true);
addEventListener("keyup",e=>keys[e.key]=false);

let rooms = [];
let lines = [];
let doors = [];

// Jump to Door
function jumpToDoor() {
 if (doors.length > 0) {
  const d = doors[0];
  player.x = (d.x1 + d.x2) / 2 - 10;
  player.y = (d.y1 + d.y2) / 2;
  console.log("Jumped to door");
  draw();
  const currentRoom = roomAt(player.x, player.y);
  if (currentRoom) {
   enter3DRoom(currentRoom);
  }
 } else {
  console.log("No doors found");
 }
}

async function loadMazeData() {
 try {
  const response = await fetch("maze.json");
  const data = await response.json();
  rooms = data.rooms || [];
  lines = data.lines || [];
  doors = data.doors || [];
  rooms.forEach(r => {
   if (!r.name) r.name = "Room " + r.id;
   if (!r.textColor) r.textColor = "#f2f2f2";
  });
  populateDropdown();
  draw();
 } catch (err) {
  console.error("Failed to load maze.json", err);
 }
}

const roomSelect = document.getElementById("roomSelect");
function populateDropdown(){
 roomSelect.innerHTML="";
 rooms.forEach(r=>{
  const o=document.createElement("option");
  o.value=r.id;
  o.textContent=r.name;
  roomSelect.appendChild(o);
 });
}

function renameRoom(){
 const r=rooms.find(x=>x.id==roomSelect.value);
 if(!r) return;
 if(roomName.value) r.name=roomName.value;
 r.textColor=roomColor.value;
 populateDropdown();
 draw();
}

function saveLayout(){
 const data={rooms,lines,doors};
 const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
 const a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="maze-layout.json";
 a.click();
 URL.revokeObjectURL(a.href);
}

function loadLayout(e){
 const f=e.target.files[0]; if(!f) return;
 const r=new FileReader();
 r.onload=ev=>{
  const d=JSON.parse(ev.target.result);
  rooms=d.rooms||[];
  lines=d.lines||[];
  doors=d.doors||[];
  populateDropdown();
  draw();
 };
 r.readAsText(f);
}

// ==================== COLLISION & MOVEMENT ====================
function pointToSegmentDistance(px,py,x1,y1,x2,y2){
 const dx=x2-x1,dy=y2-y1;
 if(!dx&&!dy) return Math.hypot(px-x1,py-y1);
 const t=((px-x1)*dx+(py-y1)*dy)/(dx*dx+dy*dy);
 const c=Math.max(0,Math.min(1,t));
 return Math.hypot(px-(x1+c*dx),py-(y1+c*dy));
}

function roomAt(x,y){
 return rooms.find(r=>x>=r.x&&x<=r.x+r.w&&y>=r.y&&y<=r.y+r.h);
}

function nearDoorForRoom(roomId,x,y){
 return doors.some(d => d.roomId===roomId &&
  pointToSegmentDistance(x,y,d.x1,d.y1,d.x2,d.y2) <= player.r + 5);
}

function hitsAnyWallLine(x,y){
 return lines.some(L => pointToSegmentDistance(x,y,L.x1,L.y1,L.x2,L.y2) <= player.r + 4);
}

function canCrossRoomBoundary(currentRoom, nextRoom, x, y) {
 if (!currentRoom && !nextRoom) return true;
 if (!currentRoom && nextRoom) return nearDoorForRoom(nextRoom.id, x, y);
 if (currentRoom && !nextRoom) return nearDoorForRoom(currentRoom.id, x, y);
 if (currentRoom && nextRoom) {
  if (currentRoom.id === nextRoom.id) return true;
  return nearDoorForRoom(currentRoom.id, x, y) || nearDoorForRoom(nextRoom.id, x, y);
 }
 return false;
}

function tryMovePlayer(dx,dy){
 let nx = player.x + dx, ny = player.y;
 if (!hitsAnyWallLine(nx, ny)) {
  const c = roomAt(player.x, player.y);
  const n = roomAt(nx, ny);
  if (canCrossRoomBoundary(c, n, nx, ny)) player.x = nx;
 }

 nx = player.x; ny = player.y + dy;
 if (!hitsAnyWallLine(nx, ny)) {
  const c = roomAt(player.x, player.y);
  const n = roomAt(nx, ny);
  if (canCrossRoomBoundary(c, n, nx, ny)) player.y = ny;
 }
}

function gentleSnapBack() {
 const room = roomAt(player.x, player.y);
 if (!room) return;
 if (nearDoorForRoom(room.id, player.x, player.y)) return;

 const margin = 12;
 if (player.x < room.x + margin) player.x = room.x + margin;
 if (player.x > room.x + room.w - margin) player.x = room.x + room.w - margin;
 if (player.y < room.y + margin) player.y = room.y + margin;
 if (player.y > room.y + room.h - margin) player.y = room.y + room.h - margin;
}

function clampOutsideToCanvas() {
 if (roomAt(player.x, player.y)) return;
 const margin = player.r + 2;
 if (player.x < margin) player.x = margin;
 if (player.x > canvas.width - margin) player.x = canvas.width - margin;
 if (player.y < margin) player.y = margin;
 if (player.y > canvas.height - margin) player.y = canvas.height - margin;
}

function updatePlayer(dt){
 let dx=0,dy=0;
 if(keys.ArrowUp || keys["w"]) dy-=player.speed;
 if(keys.ArrowDown || keys["s"]) dy+=player.speed;
 if(keys.ArrowLeft || keys["a"]) dx-=player.speed;
 if(keys.ArrowRight || keys["d"]) dx+=player.speed;

 player.moving = dx!==0||dy!==0;
 if(player.moving){
  if(Math.abs(dx)>Math.abs(dy)) player.dir=dx>0?"right":"left";
  else player.dir=dy>0?"down":"up";
 }

 tryMovePlayer(dx,dy);
 gentleSnapBack();
 clampOutsideToCanvas();

 if(player.moving){
  player.frameTime+=dt;
  if(player.frameTime>=player.frameDuration){
   player.frameTime=0;
   player.frame=(player.frame+1)%4;
  }
 } else {
  player.frame=0;
  player.frameTime=0;
 }
}

// ==================== 3D ROOM WITH LOADING BALL ====================
let threeScene, threeCamera, threeRenderer;
const loadingBall = document.getElementById("loadingBall");

async function enter3DRoom(room) {
  const container = document.getElementById("threeContainer");
  container.style.display = "block";
  const info = document.getElementById("threeInfo");

  info.textContent = `Loading ${room.name || 'Room'}...`;
  loadingBall.style.display = "block";   // Show spinner

  if (!threeRenderer) {
    threeScene = new THREE.Scene();
    threeScene.background = new THREE.Color(0x1a1a2e);

    threeCamera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    threeRenderer = new THREE.WebGLRenderer({ antialias: true });
    threeRenderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(threeRenderer.domElement);

    // Strong lighting to make most models visible
    threeScene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const hemiLight = new THREE.HemisphereLight(0xaaaaaa, 0x444444, 0.8);
    threeScene.add(hemiLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.3);
    dirLight.position.set(20, 40, 30);
    threeScene.add(dirLight);
  }

  const gltfLoader = new THREE.GLTFLoader();
  const dracoLoader = new THREE.DRACOLoader();
  dracoLoader.setDecoderPath('https://unpkg.com/three@0.172.0/examples/js/libs/draco/');
  gltfLoader.setDRACOLoader(dracoLoader);

  const modelPath = "Rooms/room1.glb";

  gltfLoader.load(
    modelPath,
    (gltf) => {
      console.log("✅ GLB loaded successfully!", gltf);
      loadingBall.style.display = "none";   // STOP the spinning ball

      // Remove old model if any
      while (threeScene.children.length > 4) {
        threeScene.remove(threeScene.children[4]);
      }

      const model = gltf.scene;
      threeScene.add(model);

      // Auto-center and scale the model
      const box = new THREE.Box3().setFromObject(model);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());

      const maxDim = Math.max(size.x, size.y, size.z) || 1;
      const targetSize = 35;           // Change this number if the room looks too big or small
      const scale = targetSize / maxDim;

      model.scale.setScalar(scale);
      model.position.sub(center.multiplyScalar(scale));
      model.position.y += 4;

      threeCamera.position.set(0, 28, 60);
      threeCamera.lookAt(0, 8, 0);

      info.textContent = `You are now in ${room.name || 'the room'}`;
    },
    (progress) => {
      const percent = progress.total ? (progress.loaded / progress.total * 100).toFixed(1) : "~";
      info.textContent = `Loading ${room.name || 'Room'}... ${percent}%`;
    },
    (error) => {
      console.error("❌ Failed to load model:", modelPath, error);
      loadingBall.style.display = "none";   // Stop spinner on error too
      info.textContent = `Error loading ${modelPath} — check console (F12)`;
    }
  );

  function animate3D() {
    requestAnimationFrame(animate3D);
    if (threeRenderer) threeRenderer.render(threeScene, threeCamera);
  }
  animate3D();
}

function exit3DMode() {
  document.getElementById("threeContainer").style.display = "none";
  loadingBall.style.display = "none";
  if (doors.length > 0) {
    const d = doors[0];
    player.x = (d.x1 + d.x2) / 2 + 15;
    player.y = (d.y1 + d.y2) / 2;
  } else {
    player.x = 150;
    player.y = 300;
  }
  console.log("Exited 3D mode");
}

// ==================== DRAW PLAYER ====================
function drawProceduralTopDownStanding(x,y,dir,frame,p){
 const stride=[0,1,0,-1][frame]*p.legs.stride;
 let vx=0,vy=0;
 if(dir==="up")vy=-1;
 else if(dir==="down")vy=1;
 else if(dir==="left")vx=-1;
 else vx=1;
 const px=-vy, py=vx;
 ctx.save();
 ctx.translate(x,y);
 ctx.fillStyle="#111";
 ctx.beginPath();
 ctx.ellipse(px*p.legs.footSep+vx*stride,py*p.legs.footSep+vy*stride,5,7,0,0,Math.PI*2);
 ctx.fill();
 ctx.beginPath();
 ctx.ellipse(-px*p.legs.footSep-vx*stride,-py*p.legs.footSep-vy*stride,5,7,0,0,Math.PI*2);
 ctx.fill();
 ctx.fillStyle="#2c7bd9";
 ctx.beginPath();
 ctx.ellipse(p.body.x,p.body.y,p.body.w,p.body.h,0,0,Math.PI*2);
 ctx.fill();
 ctx.fillStyle="#d8b28a";
 ctx.beginPath();
 ctx.arc(p.head.x,p.head.y,p.head.r,0,Math.PI*2);
 ctx.fill();
 ctx.restore();
}

function drawPlayer(){
 drawProceduralTopDownStanding(player.x, player.y, player.dir, player.frame, PLAYER_PARTS);
}

function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
 rooms.forEach(r=>{
  ctx.fillStyle=r.color || "#555";
  ctx.fillRect(r.x,r.y,r.w,r.h);
  ctx.fillStyle=r.textColor;
  ctx.fillText(r.name,r.x+8,r.y+18);
 });
 ctx.strokeStyle="yellow"; ctx.lineWidth=5;
 doors.forEach(d=>{
  ctx.beginPath(); ctx.moveTo(d.x1,d.y1); ctx.lineTo(d.x2,d.y2); ctx.stroke();
 });
 ctx.strokeStyle="#000"; ctx.lineWidth=3;
 lines.forEach(L=>{
  ctx.beginPath(); ctx.moveTo(L.x1,L.y1); ctx.lineTo(L.x2,L.y2); ctx.stroke();
 });
 drawPlayer();
}

function resize(){
 canvas.width=canvas.clientWidth;
 canvas.height=canvas.clientHeight;
}
addEventListener("resize",resize);
resize();

let lastTime=performance.now();
function loop(now){
 const dt=now-lastTime;
 lastTime=now;
 updatePlayer(dt);
 draw();
 requestAnimationFrame(loop);
}

loadMazeData();
requestAnimationFrame(loop);
document.getElementById("backButton").onclick = exit3DMode;
</script>
</body>
</html>
