<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Debug Loader</title>
  <style>
    body { background:#111; color:#0f0; font-family: monospace; padding:20px; }
  </style>
</head>
<h1 style="color: red; font-size: 40px;">
  INDEX.HTML IS LOADING
</h1>
<body>

<div id="status">Page loaded</div>

<script type="module">
  import { loadCase } from "./game/loadCase.js";

  const status = document.getElementById("status");

  status.innerText = "Script started";

  async function startGame() {
    status.innerText = "Calling loadCase()…";

    const caseData = await loadCase();

    status.innerText =
      "✅ CASE LOADED\n" +
      "Victim: " + caseData.victimId + "\n" +
      "Culprit: " + caseData.culpritId;
  }

  startGame();
</script>

</body>
</html>
