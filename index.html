<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Crime Scene Maze App</title>

<style>
  body {
    margin: 0;
    background: #000;
    font-family: Arial, sans-serif;
    margin-left: 150px;
    overflow: hidden;
  }

  #sidebar {
    position: fixed;
    left: 0;
    top: 0;
    width: 135px;
    height: 100%;
    background: #222;
    color: #fff;
    padding: 12px;
    box-sizing: border-box;
    border-right: 3px solid #444;
    font-size: 14px;
  }

  #sidebar h3 {
    margin-top: 0;
    text-align: center;
  }

  #sidebar label {
    display: block;
    margin-top: 10px;
  }

  #sidebar select,
  #sidebar input {
    width: 100%;
    padding: 6px;
    margin-top: 5px;
    box-sizing: border-box;
  }

  #sidebar button {
    width: 100%;
    margin-top: 10px;
    padding: 8px;
    background: #444;
    color: #fff;
    border: none;
    cursor: pointer;
  }

  #sidebar button:hover {
    background: #666;
  }

  #toolLabel {
    margin-top: 10px;
    text-align: center;
    font-size: 13px;
    color: #ccc;
  }

  #maze {
    position: absolute;
    left: 150px;
    top: 0;
    width: calc(100vw - 150px);
    height: 100vh;
    background: #fff;
    border: 3px solid #000;
    display: block;
  }
</style>
</head>

<body>

<div id="sidebar">
  <h3>Room Tools</h3>

  <button onclick="setTool('edit')">Edit Rooms</button>
  <button onclick="setTool('draw')">Draw Line</button>
  <button onclick="setTool('erase')">Erase Line</button>
  <button onclick="setTool('door')">Draw Door</button>

  <div id="toolLabel">Tool: Edit Rooms</div>

  <label for="roomSelect">Select Room:</label>
  <select id="roomSelect"></select>

  <label for="roomName">Room Name:</label>
  <input type="text" id="roomName" placeholder="Enter room name">

  <label for="roomColor">Text Color:</label>
  <input type="color" id="roomColor" value="#000000">

  <button onclick="renameRoom()">Rename Room</button>

  <button onclick="saveLayout()">Save Layout</button>
  <button onclick="document.getElementById('loadFile').click()">Load Layout</button>
  <input type="file" id="loadFile" accept=".json" style="display:none" onchange="loadLayout(event)">
</div>

<canvas id="maze"></canvas>

<script>
const canvas = document.getElementById("maze");
const ctx = canvas.getContext("2d");

let tool = "edit";
function setTool(t) {
  tool = t;
  document.getElementById("toolLabel").textContent = "Tool: " + t;
}

let rooms = [];
let lines = [];
let doors = [];   // ⭐ DOORS ARRAY
let selectedRoomId = null;

let draggingRoom = null;
let dragOffsetX = 0;
let dragOffsetY = 0;

let pendingLineStart = null;

/* DARKER ROOMS */
rooms.push(
  {id:1, x:50,  y:50,  w:190, h:160, color:"#334488"},
  {id:2, x:250, y:50,  w:180, h:150, color:"#1f6b4a"},
  {id:3, x:450, y:50,  w:170, h:140, color:"#992222"},
  {id:4, x:50,  y:250, w:160, h:130, color:"#997722"},
  {id:5, x:250, y:250, w:150, h:120, color:"#227799"},
  {id:6, x:450, y:250, w:140, h:110, color:"#994477"},
  {id:7, x:50,  y:450, w:150, h:120, color:"#555545"},
  {id:8, x:250, y:450, w:150, h:120, color:"#444474"},
  {id:9, x:450, y:450, w:150, h:120, color:"#333333"},
  {id:10,x:650, y:250, w:120, h:70,  color:"#666666"}
);

for (const r of rooms) {
  r.name = "Room " + r.id;
  r.textColor = "#000000";
}

const roomSelect = document.getElementById("roomSelect");
function populateDropdown() {
  roomSelect.innerHTML = "";
  for (const r of rooms) {
    const opt = document.createElement("option");
    opt.value = r.id;
    opt.textContent = r.name;
    roomSelect.appendChild(opt);
  }
}
populateDropdown();

function renameRoom() {
  const id = parseInt(roomSelect.value);
  const newName = document.getElementById("roomName").value.trim();
  const newColor = document.getElementById("roomColor").value;

  const r = rooms.find(x => x.id === id);
  if (!r) return;

  if (newName) r.name = newName;
  r.textColor = newColor;

  populateDropdown();
  draw();
}

function roomAt(x, y) {
  for (const r of rooms) {
    if (x >= r.x && x <= r.x + r.w &&
        y >= r.y && y <= r.y + r.h) {
      return r;
    }
  }
  return null;
}

function pointToSegmentDistance(px, py, x1, y1, x2, y2) {
  const dx = x2 - x1;
  const dy = y2 - y1;
  if (dx === 0 && dy === 0) {
    return Math.hypot(px - x1, py - y1);
  }
  const t = ((px - x1)*dx + (py - y1)*dy) / (dx*dx + dy*dy);
  const clamped = Math.max(0, Math.min(1, t));
  const cx = x1 + clamped * dx;
  const cy = y1 + clamped * dy;
  return Math.hypot(px - cx, py - cy);
}

canvas.addEventListener("mousedown", (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  /* ⭐ DOOR TOOL */
  if (tool === "door") {
    const r = roomAt(x, y);
    if (r) {
      const edgeSize = 10;
      const doorLength = 25;

      let x1, y1, x2, y2;

      if (Math.abs(y - r.y) < edgeSize) {
        x1 = x - doorLength/2;
        x2 = x + doorLength/2;
        y1 = y2 = r.y;
      }
      else if (Math.abs(y - (r.y + r.h)) < edgeSize) {
        x1 = x - doorLength/2;
        x2 = x + doorLength/2;
        y1 = y2 = r.y + r.h;
      }
      else if (Math.abs(x - r.x) < edgeSize) {
        y1 = y - doorLength/2;
        y2 = y + doorLength/2;
        x1 = x2 = r.x;
      }
      else if (Math.abs(x - (r.x + r.w)) < edgeSize) {
        y1 = y - doorLength/2;
        y2 = y + doorLength/2;
        x1 = x2 = r.x + r.w;
      }
      else {
        return;
      }

      doors.push({roomId: r.id, x1, y1, x2, y2});
      draw();
    }
    return;
  }

  /* EDIT ROOMS */
  if (tool === "edit") {
    const r = roomAt(x, y);
    selectedRoomId = r ? r.id : null;

    if (r) {
      draggingRoom = r;
      dragOffsetX = x - r.x;
      dragOffsetY = y - r.y;

      roomSelect.value = r.id;
      document.getElementById("roomName").value = r.name;
      document.getElementById("roomColor").value = r.textColor;
    }

    draw();
  }

  /* DRAW LINES */
  else if (tool === "draw") {
    if (!pendingLineStart) {
      pendingLineStart = {x, y};
    } else {
      let x1 = pendingLineStart.x;
      let y1 = pendingLineStart.y;
      let x2 = x;
      let y2 = y;

      if (Math.abs(x2 - x1) > Math.abs(y2 - y1)) {
        y2 = y1;
      } else {
        x2 = x1;
      }

      lines.push({x1, y1, x2, y2});
      pendingLineStart = null;
      draw();
    }
  }

  /* ⭐ ERASE LINES + DOORS */
  else if (tool === "erase") {
    const threshold = 8;

    // ERASE LINES
    for (let i = 0; i < lines.length; i++) {
      const L = lines[i];
      const d = pointToSegmentDistance(x, y, L.x1, L.y1, L.x2, L.y2);
      if (d <= threshold) {
        lines.splice(i, 1);
        draw();
        return;
      }
    }

    // ⭐ ERASE DOORS
    for (let i = 0; i < doors.length; i++) {
      const D = doors[i];
      const d = pointToSegmentDistance(x, y, D.x1, D.y1, D.x2, D.y2);
      if (d <= threshold) {
        doors.splice(i, 1);
        draw();
        return;
      }
    }
  }
});

canvas.addEventListener("mousemove", (e) => {
  if (tool !== "edit" || !draggingRoom) return;

  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  draggingRoom.x = Math.max(0, Math.min(canvas.width - draggingRoom.w, x - dragOffsetX));
  draggingRoom.y = Math.max(0, Math.min(canvas.height - draggingRoom.h, y - dragOffsetY));

  draw();
});

canvas.addEventListener("mouseup", () => {
  draggingRoom = null;
});

function resizeCanvas() {
  canvas.width = canvas.clientWidth;
  canvas.height = canvas.clientHeight;
  draw();
}

window.addEventListener("resize", resizeCanvas);
resizeCanvas();

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  /* ROOMS */
  for (const r of rooms) {
    ctx.fillStyle = r.color;
    ctx.fillRect(r.x, r.y, r.w, r.h);

    if (r.id === selectedRoomId) {
      ctx.strokeStyle = "#ffff00";
      ctx.lineWidth = 3;
      ctx.strokeRect(r.x, r.y, r.w, r.h);
    }

    ctx.fillStyle = r.textColor;
    ctx.font = "16px Arial";
    ctx.fillText(r.name, r.x + 10, r.y + 20);
  }

  /* ⭐ DRAW DOORS */
  ctx.strokeStyle = "yellow";
  ctx.lineWidth = 5;
  for (const d of doors) {
    ctx.beginPath();
    ctx.moveTo(d.x1, d.y1);
    ctx.lineTo(d.x2, d.y2);
    ctx.stroke();
  }

  /* LINES */
  ctx.strokeStyle = "#000";
  ctx.lineWidth = 3;
  for (const L of lines) {
    ctx.beginPath();
    ctx.moveTo(L.x1, L.y1);
    ctx.lineTo(L.x2, L.y2);
    ctx.stroke();
  }
}

/* SAVE */
function saveLayout() {
  const data = {
    rooms: rooms,
    lines: lines,
    doors: doors
  };

  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], {type: "application/json"});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "maze-layout.json";
  a.click();

  URL.revokeObjectURL(url);
}

/* LOAD */
function loadLayout(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);

      rooms = data.rooms || [];
      lines = data.lines || [];
      doors = data.doors || [];

      populateDropdown();
      draw();
    } catch (err) {
      alert("Error reading file.");
    }
  };

  reader.readAsText(file);
}

draw();
</script>

</body>
</html>
